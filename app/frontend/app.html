<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo — Clinical Intelligence</title>
  <meta name="description" content="Multi-agent clinical reasoning: RAG, knowledge graph, LLM orchestration, real-time diagnostics.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="static/css/reset.css?v=4">
  <link rel="stylesheet" href="static/css/variables.css?v=4">
  <link rel="stylesheet" href="static/css/app.css?v=4">
  <link rel="stylesheet" href="static/css/clinical.css?v=4">
</head>
<body class="app-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-mark">✦</div>
      <span class="logo-name">Apollo</span>
      <span class="logo-version">v0.2-alpha</span>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input type="search" id="patientSearch" placeholder="Search cases…" autocomplete="off">
      </div>
    </div>

    <div class="sidebar-section-label">Demo Cases</div>
    <div class="patient-list" id="patientList">
      <!-- Populated by app.js from /api/agent/cases -->
    </div>

    <!-- KG status -->
    <div class="sidebar-section-label" style="margin-top:16px;">Knowledge Graph</div>
    <div class="kg-status-bar" id="kgStatusBar">
      <div class="kg-status-row">
        <span class="kg-dot offline"></span>
        <span class="kg-label">Checking…</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-add-patient" id="btnAddPatient">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Upload Patient
      </button>
    </div>

  </aside>

  <!-- Main content -->
  <div class="main-content">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🏥</div>
      <h2>No patient selected</h2>
      <p>Select a demo case from the sidebar or upload your own patient data.</p>
      <div class="empty-state-actions">
        <a href="?case=case_a" class="btn-primary" id="btnDemoFromEmpty">🧬 Try Demo Patient</a>
        <button class="btn-outline" id="btnUploadFromEmpty">📁 Upload Patient Data</button>
      </div>
    </div>

    <!-- Patient view -->
    <div class="patient-view" id="patientView" style="display:none;">

      <!-- Demo banner -->
      <div class="demo-banner" id="demoBanner" style="display:none;">
        <div class="db-dot"></div>
        <span class="db-text">Demo Mode</span>
        <span class="db-sub">— Synthetic patient data</span>
        <a href="index.html" style="margin-left:auto;font-size:12px;color:var(--text-muted);">← Home</a>
      </div>

      <!-- Patient header -->
      <header class="patient-header" id="patientHeader"></header>

      <!-- Tab nav -->
      <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="summary">
          <span class="tab-icon">📋</span> Summary
        </button>
        <button class="tab-btn" data-tab="diagnostics">
          <span class="tab-icon">🧠</span> Diagnostics
        </button>
        <button class="tab-btn" data-tab="upload">
          <span class="tab-icon">📁</span> Documents
        </button>
        <button class="tab-btn" data-tab="ask">
          <span class="tab-icon">💬</span> Ask
        </button>
        <button class="tab-btn" data-tab="research">
          <span class="tab-icon">🔬</span> Research
        </button>
      </nav>

      <!-- Tab panels -->
      <div class="tab-panels" id="tabPanels">

        <!-- Summary -->
        <div class="tab-panel active" id="tab-summary">
          <div style="display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:13px;">
            <div class="spinner"></div> Loading summary…
          </div>
        </div>

        <!-- Diagnostics — fully live -->
        <div class="tab-panel" id="tab-diagnostics">
          <!-- Populated by diagnostics.js on tab activation -->
        </div>

        <!-- Documents / Upload -->
        <div class="tab-panel" id="tab-upload">
          <!-- Populated by upload.js -->
        </div>

        <!-- Ask — agentic RAG chat -->
        <div class="tab-panel" id="tab-ask">
          <!-- Populated by ask.js on tab activation -->
        </div>

        <!-- Research — PubMed papers -->
        <div class="tab-panel" id="tab-research">
          <!-- Populated by research.js on tab activation -->
        </div>

      </div><!-- /tab-panels -->
    </div><!-- /patient-view -->

  </div><!-- /main-content -->

  <!-- Scripts — order matters: api → data → renderers → controller -->
  <script src="static/js/api.js?v=4"></script>
  <script src="static/js/demo-data.js?v=4"></script>
  <script src="static/js/summary.js?v=4"></script>
  <script src="static/js/upload.js?v=4"></script>
  <script src="static/js/diagnostics.js?v=4"></script>
  <script src="static/js/ask.js?v=4"></script>
  <script src="static/js/research.js?v=4"></script>
  <script src="static/js/app.js?v=4"></script>

</body>
</html>
